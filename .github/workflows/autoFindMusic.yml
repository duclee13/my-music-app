name: Auto Fetch Music Database

on:
  schedule:
    # Hẹn giờ chạy tự động vào lúc 00:00 UTC (tức 7:00 sáng giờ Việt Nam) mỗi ngày
    - cron: '0 0 * * *'
  workflow_dispatch: # Nút bấm giúp bạn có thể tự click chạy thủ công bất cứ lúc nào trên web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Execute music scraper script
      run: python getMusic.py

    - name: Commit and push changes back to GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add albums.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-updated albums.json with new songs" && git push)
